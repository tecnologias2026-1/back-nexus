services:
  - type: web
    name: tecnologias-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.app:app
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: tecnologias-db
          property: connectionString

databases:
  - name: tecnologias-db
    plan: free
